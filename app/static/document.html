<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文档详情 - Smart Customer Support Agent</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260614-doc-page" />
  </head>
  <body class="document-page">
    <main class="document-shell">
      <!-- Static shell; document.js fills title, metadata, TOC, and chunks. -->
      <header class="document-hero">
        <a class="back-link" href="/">返回 Agent 工作台</a>
        <p class="eyebrow">Knowledge Base Document</p>
        <h1 id="documentTitle">文档详情</h1>
        <p id="documentMeta">正在加载文档内容...</p>
      </header>

      <section class="document-layout">
        <!-- Chunk navigation stays separate from chunk content for long documents. -->
        <aside class="document-toc">
          <h2>内容切片</h2>
          <div id="chunkToc" class="chunk-toc-list"></div>
        </aside>

        <section class="document-content">
          <div id="documentStatus" class="document-status">正在加载...</div>
          <div id="documentChunks" class="document-chunks"></div>
        </section>
      </section>
    </main>
    <script src="/static/document.js?v=20260614-doc-page"></script>
  </body>
</html>
